<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giant Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="menova_calc.css" />
</head>
<body>

<!-- Navigační menu -->
<div class="nav">
    <a href="Klasik_calc.html">Základní Kalkulačka</a>
    <a href="vedecka_calc.html">Vědecká Kalkulačka</a>
    <a href="Menova_calc.html">Měnová Kalkulačka</a>
</div>

<!-- Kalkulačka jako celek -->
<div class="calc">
    <div class="display">
        <div class="expr" id="expr"></div>
        <div class="result" id="result">0</div>
    </div>
    <!-- Jednotlivá tlačítka kalkulačky -->
    <div class="btns">
        <button class="btn btn-clear" data-val="C">AC</button>
        <button class="btn btn-del"   data-val="DEL">⌫</button>
        <button class="btn btn-fn"    data-val="%">%</button>
        <button class="btn btn-op"    data-val="CZK">CZK</button>

        <button class="btn btn-num"   data-val="7">7</button>
        <button class="btn btn-num"   data-val="8">8</button>
        <button class="btn btn-num"   data-val="9">9</button>
        <button class="btn btn-op"    data-val="EURO">EURO</button>

        <button class="btn btn-num"   data-val="4">4</button>
        <button class="btn btn-num"   data-val="5">5</button>
        <button class="btn btn-num"   data-val="6">6</button>
        <button class="btn btn-op"    data-val="DOLLAR">DOLLAR</button>

        <button class="btn btn-num"   data-val="1">1</button>
        <button class="btn btn-num"   data-val="2">2</button>
        <button class="btn btn-num"   data-val="3">3</button>
        <button class="btn btn-op"    data-val="LIBRY">LIBRY</button>

        <button class="btn btn-num btn-zero" data-val="0">0</button>
        <button class="btn btn-num"   data-val=".">.</button>
        <button class="btn btn-op"    data-val="=">=</button>
    </div>
</div>

<script src="Menova_calc.js"></script>
</body>
</html>
