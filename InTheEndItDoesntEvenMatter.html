<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Kurfa zase webovky na papir mi už jebe kurfa</title>
</head>

<body>
<h2>Objednávka tulipánů</h2>

<form>

<fieldset>
    <legend>Kontaktni udaje</legend>

    <label for="jmeno">
        jmeno:
        <input type="text" id="jmeno" name="jmeno" required placeholder="zadejte sve jmeno kokoti">
    </label><br>

    <label for="email">
        email:
        <input type="email" id="email" name="email" required placeholder="zadejte svuj email kokoti">
    </label>

</fieldset>
</form>

<form>
    <fieldset>


 <label for="pocet"> zadej cislo kkte:
        <input type="number" id="pocet" name="pocet" min="1" max="100" required placeholder="1 az 100 kokot tupa">
 </label><br>

<label for="barva">
  barva:<select id="barva" name="barva">
    <option value="cervena">cervena </option>
    <option value="zluta">zluta </option>
    <option value="purpla">purpla </option>
    <option value="orange">orange </option>

</select>
</label><br>

<label for="objednavka jako darek"> objednavka jako darek
<input type="checkbox" id="objednavka jako darek" name="objednavka jako darek">
</label>

<label for="datum">
    <input type="date" id="datum" name="datum" required><br>

    <input type="radio" id="karta" name="radio" required>karta<br>

    <input type="radio" id="hotove" name="radio" required>hotove<br>

</label>


    </fieldset>
</form>



















</body>
</html>
